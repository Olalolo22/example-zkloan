services:
  proof-server:
    container_name: 'zkloan-proof-server'
    image: 'midnightntwrk/proof-server:8.1.0'
    command: ['midnight-proof-server -v']
    ports:
      - '127.0.0.1:6300:6300'
    environment:
      RUST_BACKTRACE: 'full'
    # no healthcheck: the 8.1.x image is distroless (no curl or shell to exec);
    # readiness is observable via GET /version on port 6300 from the host

  indexer:
    container_name: 'zkloan-indexer'
    image: 'midnightntwrk/indexer-standalone:4.3.3'
    # on a cold start the spo-indexer sub-process exits if the node has not
    # produced its first block yet; a retry after the node ticks over succeeds
    restart: 'on-failure:10'
    env_file: standalone.env.example
    ports:
      - '127.0.0.1:8088:8088'
    environment:
      RUST_LOG: 'indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=off,info'
      APP__APPLICATION__NETWORK_ID: 'undeployed'
    healthcheck:
      test: ['CMD-SHELL', 'cat /var/run/indexer-standalone/running']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_healthy

  node:
    image: 'midnightntwrk/midnight-node:1.0.0'
    container_name: 'zkloan-node'
    ports:
      - '127.0.0.1:9944:9944'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'